<!--{template install:header}-->
<div class="row mt-3">
	<div class="col-lg-8 offset-lg-2">
		<div class="card">
			<div class="card-body">
				<h3><!--{lang step_1_title}--></h3>
				<div class="table-responsive">
					<table class="table table-fixed">
						<tr class="xn_center">
							<th  class="xn_left" width="200"><b><!--{lang runtime_env_check}--></b></th>
							<th width="100"><!--{lang required}--></th>
							<th width="100"><!--{lang current}--></th>
							<th width="100"><!--{lang check_result}--></th>
						</tr>
						<!--{loop array('pdo_mysql','mysqli') $v}-->
						<tr>
							<td colspan="3"><!--{$v}--></td>
							<td style="text-align: center;">
							<!--{if extension_loaded($v)}-->
								<div class="text-success"><i class="icon-ok"></i><!--{lang passed}--></div>
							<!--{else}-->
								<div class="text-danger"><i class="icon-remove"></i><!--{lang not_passed}--></div>
							<!--{/if}-->
							</td>
						</tr>
						<!--{/loop}-->
						<tr class="xn_center">
							<th colspan="4"  class="xn_left"><b><!--{lang dir_writable_check}--></b></th>
						</tr>
				
						<!--{loop array('/','cache','upload','plugin') $v}-->
						<tr>
							<td colspan="3"><!--{$v}--></td>
							<td class="xn_center">
								<!--{eval $perms = (int)substr(sprintf('%o', fileperms($myapp['path']['root'].$v)),-3);}-->
								<!--{if $perms>=755}-->
									<div class="text-success"><i class="icon-check"></i><!--{$perms}--></div>
									<!--{else}-->
										<div class="text-danger"><i class="icon-close"></i><!--{$perms}--></div>
									<!--{/if}-->
							</td>
						</tr>
						<!--{/loop}-->
						
						<tr class="xn_center">
							<th colspan="4"  class="xn_left"><b><!--{lang function_check}--></b></th>
						</tr>
				
						<tr>
							<td colspan="3">
								glob()
							</td>
							<td class="xn_center">
								<!--{if function_exists('glob')}-->
									<div class="text-success"><i class="icon-check"></i><!--{lang supported}--></div>
								<!--{else}-->
									<div class="text-danger"><i class="icon-close"></i><!--{lang not_supported}--></div>
								<!--{/if}-->
							</td>
						</tr>
				
						<tr>
							<td colspan="3">
								gzinflate()
							</td>
							<td class="xn_center">
								<!--{if function_exists('gzinflate')}-->
									<div class="text-success"><i class="icon-check"></i><!--{lang supported}--></div>
								<!--{else}-->
									<div class="text-danger"><i class="icon-close"></i><!--{lang not_supported}--></div>
								<!--{/if}-->
							</td>
						</tr>
				
						<tr>
							<td colspan="3">
								mb_substr()
							</td>
							<td class="xn_center">
								<!--{if function_exists('mb_substr')}-->
									<div class="text-success"><i class="icon-check"></i><!--{lang supported}--></div>
								<!--{else}-->
									<div class="text-danger"><i class="icon-close"></i><!--{lang not_supported}--></div>
								<!--{/if}-->
							</td>
						</tr>
				
					</table>
				</div>
			</div>
		</div>

		<div class="text-center m-3">
			<a class="btn btn-secondary" href="<!--{url install-env "lang=".$lang}-->"><!--{lang check_again}--></a>
			<a class="btn btn-primary" href="<!--{url install-db "lang=".$lang}-->"><!--{lang next_step}--></a>
		</div>

	</div>
</div>

<!--{template install:footer}-->
