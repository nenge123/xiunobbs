<!--{if empty($_SERVER['HTTP_AJAX_FETCH'])}--><!--{template('msg/index')}--><!--{else}-->
<div class="modal fade bd-example-modal-lg" id="modal-{{ time }}" tabindex="-1" role="dialog" aria-labelledby="myLargeModalLabel" aria-hidden="true">
	<div class="modal-dialog modal-lg">
		<div class="modal-content">
			<div class="modal-header">
				<h5 class="modal-title">{{ msgtitle }}</h5>
				<button type="button" class="close" data-dismiss="modal" aria-label="Close">
					<span aria-hidden="true">&times;</span>
				</button>
			</div>
			<div class="modal-body"><!--{subtemplate('msg/content')}-->
        
			</div>
			<div class="modal-footer">
				<button type="button" class="btn btn-primary" data-dismiss="modal">{lang modal_ok}</button><!--{if !empty($myapp['ajax-nav'])}--><!--{loop $myapp['ajax-nav'] $btn}-->

				<a class="btn btn-{if isset($btn['class'])}{{ $btn['class'] }}{else}primary{/if}" href="{{ $btn['href'] }}" {if isset($btn['append'])}{{ $btn['append'] }}{/if}>{{ $btn['name'] }}</a><!--{/loop}--><!--{/if}--><!--{if empty($myapp['user']['uid'])}-->

				<button type="button" class="btn btn-success" data-ajax="api-login" data-ajaxid="#modal-{{ time }}">{lang modal_login}</button>
				<!--{/if}-->
			</div>
		</div>
	</div>
</div><!--{/if}-->
