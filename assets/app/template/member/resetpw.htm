<!--{if empty($_SERVER['HTTP_AJAX_FETCH'])}--><!--{template('forum/header')}-->

<ol class="breadcrumb d-none d-md-flex">
    <li class="breadcrumb-item"><a href="{{ url('index') }}" aria-label="{lang index_page}"><i class="icon-home"></i></a></li>
    <li class="breadcrumb-item"><a href="{{ url('forum') }}">{lang member_login}</a></li>
</ol><!--{/if}-->



<div class="card-body">
    <form action="{{ url('user-resetpw') }}" method="post" id="form">
    
        <!--{hook user_resetpw_email_before.htm}-->
        <div class="form-group input-group">
            <div class="input-group-prepend">
                <span class="input-group-text"><i class="icon icon-envelope icon-fw"></i></span>
            </div>
            <input type="text" class="form-control" placeholder="{lang email}" name="email" id="email">
            <div class="invalid-feedback"></div>
        </div>
        <!--{hook user_resetpw_email_after.htm}-->
        
        <!--{hook user_resetpw_verify_code_before.htm}-->
        <div class="media">
            <div class="media-body">
                <div class="form-group input-group">
                    <div class="input-group-prepend">
                        <span class="input-group-text"><i class="icon icon-key icon-fw"></i></span>
                    </div>
                    <input type="text" class="form-control" placeholder="{lang verify_code}" name="code" id="code">
                </div>
            </div>
            <div class="ml-1 mt-1">
                <button type="submit" class="btn btn-primary btn-sm ml-3" id="send" data-loading-text="{lang sending}..." action="{{ url('user-send_code-user_resetpw') }}">{lang send_verify_code}</button>
            </div>
        </div>
        <!--{hook user_resetpw_verify_code_after.htm}-->
        
        <button type="submit" class="btn btn-primary btn-block" id="submit" data-loading-text="{lang submiting}...">{lang next_step}</button>
    </form>
</div>

</div><!--{if empty($_SERVER['HTTP_AJAX_FETCH'])}--><!--{template('forum/footer')}--><!--{/if}-->
