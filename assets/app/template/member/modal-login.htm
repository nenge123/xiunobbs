<div class="modal fade bd-example-modal-lg" id="modal-{{ time }}" tabindex="-1" role="dialog" aria-labelledby="myLargeModalLabel" aria-hidden="true">
	<div class="modal-dialog modal-lg">
		<form  action="" method="post" class="modal-content" data-ajax="api-login"  data-ajaxid="#modal-{{ time }}">
            <input type="hidden" name="time" value="{{ time }}" hidden>
            <input type="hidden" name="hash" value="{{ loginhash }}" hidden>
			<div class="modal-header">
				<h5 class="modal-title">{lang user_login}</h5>
				<button type="button" class="close" data-dismiss="modal" aria-label="Close">
					<span aria-hidden="true">&times;</span>
				</button>
			</div>
			<div class="modal-body">
                <div class="form-group input-group">
                    <div class="input-group-prepend">
                        <span class="input-group-text"><i class="icon icon-user icon-fw"></i></span>
                    </div>
                    <input type="text" class="form-control" placeholder="{lang member_account}" name="username" required>
                    <div class="invalid-feedback"></div>
                </div>
                <div class="form-group input-group">
                    <div class="input-group-prepend">
                        <span class="input-group-text"><i class="icon icon-lock icon-fw"></i></span>
                    </div>
                    <input type="password" class="form-control" placeholder="{lang member_password}" name="password" required>
                    <div class="invalid-feedback"></div>
                </div>
                <div class="form-group">
                  <div class="form-check">
                    <label class="form-check-label">
                    <input class="form-check-input" type="checkbox" value="1">
                    {lang member_remember_me}
                    </label>
                  </div>
                </div>
			</div>
			<div class="modal-footer">
                <button type="submit" class="btn btn-success">{lang member_login}</button>
                <button type="button" class="btn btn-primary" data-dismiss="modal" hidden>{lang modal_ok}</button>
			</div>
		</form>
	</div>
</div>
