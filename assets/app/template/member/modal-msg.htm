<div class="modal fade bd-example-modal-lg" id="modal-{{ time }}" tabindex="-1" role="dialog" aria-labelledby="myLargeModalLabel" aria-hidden="true">
	<div class="modal-dialog modal-lg">
		<div class="modal-content">
            <input type="hidden" name="time" value="{{ time }}" hidden>
            <input type="hidden" name="hash" value="{{ loginhash }}" hidden>
			<div class="modal-header">
				<h5 class="modal-title">{{ errortitle }}</h5>
				<button type="button" class="close" data-dismiss="modal" aria-label="Close">
					<span aria-hidden="true">&times;</span>
				</button>
			</div>
			<div class="modal-body">
                {{ errormessage }}
			</div>
			<div class="modal-footer">
                <button type="button" class="btn btn-primary" data-dismiss="modal">{lang modal_ok}</button>
			</div>
		</form>
	</div>
</div>
