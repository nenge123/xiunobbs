<!--{if !empty($threadlist['list'])}--><!--{loop $threadlist['list'] $tid $thread}-->
			
					<li class="media thread tap" data-href="{{ url("thread-$thread[tid]") }}" data-tid="{{ $thread['tid'] }}"><!--{if $myapp->get_forum_access_value($thread['fid'],'allowtop')}-->

						<input type="checkbox" name="modtid" class="mt-3 mr-2" value="{{ $thread['tid'] }}" /><!--{/if}-->

						<a href="{{ url("user-$thread[uid]") }}" tabindex="-1" class="ml-1 mt-1 mr-3">
							<img class="avatar-3" src="{{ get_avatar_src($thread['uid']) }}">
						</a><!--{hook thread_list_inc_avatar_after.htm}-->

						<div class="media-body">
							<div class="subject break-all"><!--{hook thread_list_inc_subject_before.htm}-->

								<a href="{{ url("thread-$thread[tid]") }}">{{ $thread['subject'] }}</a><!--{hook thread_list_inc_subject_after.htm}--><!--{hook thread_list_inc_filetype_icon_before.htm}--><!--{if $thread['files'] > 0}-->
								
								<i class="icon small filetype other"></i><!--{/if}--><!--{hook thread_list_inc_filetype_icon_after.htm}--><!--{hook thread_list_inc_lock_icon_before.htm}--><!--{if $thread['closed']}-->
								
								<i class="icon-lock"></i><!--{/if}--><!--{hook thread_list_inc_lock_icon_after.htm}-->

							</div>
							<div class="d-flex justify-content-between small mt-1">
								<div><!--{hook thread_list_inc_username_before.htm}-->

									<span class="username text-grey mr-1" uid="{{ $thread['uid'] }}">{{ $thread['username'] }}</span>
									<span class="date text-grey">{{ $thread['create_date_fmt'] }}</span><!--{hook thread_list_inc_username_after.htm}--><!--{hook thread_list_inc_lastuid_before.htm}--><!--{if $thread['lastuid']}-->
									
									<span>
										<span class="text-grey mx-2">←</span>
										<span class="username text-grey mr-1" uid="{{ $thread['lastuid'] }}">{{ $thread['lastusername'] }}</span>
										<span class="text-grey">{{ $thread['last_date_fmt'] }}</span>
									</span><!--{/if}--><!--{hook thread_list_inc_lastuid_after.htm}-->
										
								</div>
								<div class="text-muted small"><!--{hook thread_list_inc_view_before.htm}-->

									<span class="ml-2 d-none"><i class="icon-eye"></i> {{ $thread['views'] }}</span><!--{hook thread_list_inc_view_after.htm}--><!--{hook thread_list_inc_posts_before.htm}-->

									<span class="ml-2"><i class="icon-comment-o"></i> {{ $thread['posts'] }}</span><!--{hook thread_list_inc_posts_after.htm}-->

								</div>
							</div>
						</div>
					</li><!--{/loop}--><!--{else}-->

					<li>
						<div>{lang none}</div>
					</li><!--{/if}-->
