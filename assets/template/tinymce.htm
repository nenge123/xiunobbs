<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <textarea class="fastpost-textarea"></textarea>
    <div id="mytoolbar"></div>
    <script type="application/javascript" src="{site js}tinymce/tinymce.min.js"></script>
    <script type="text/javascript">
        tinymce.init({
            promotion: !1, //隐藏升级按钮
            branding: !1,//隐藏官网链接
            plugins: [
                "accordion","advlist","anchor","autolink","autoresize","autosave","charmap","code","codesample","directionality","emoticons","fullscreen","help","image","importcss","insertdatetime","link","lists","media","nonbreaking","pagebreak","preview","quickbars","save","searchreplace","table","template","visualblocks","visualchars","wordcount"
            ],
            //skin: 'tinymce-5-dark',
            //icons: 'thin',\
            //base_url: 'https://cdn.staticfile.org/tinymce/6.5.0/',
            skin: 'oxide',
            //skin_url:'https://cdn.staticfile.org/tinymce/6.5.0/skins/ui/oxide',
            language: 'zh-Hans',
            //language_url:'{site js}tinymce/langs/zh-Hans.js',
            toolbar: !1,
            toolbar_location: 'bottom',
            selector: '.fastpost-textarea',
            menubar: 'file insert edit format table tools fonttext help',
            mobile: {
                menubar: 'file insert edit format table tools fonttext help',
            },
            menu: {
                'fonttext': { title: '文本', items: 'bold superscript subscript forecolor backcolor removeformat' }
            }
        });
    </script>
</body>

</html>
